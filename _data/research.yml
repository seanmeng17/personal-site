intro:
  - "My curiosities have taken me from systems/circuit neuroscience, to genetics, to engineering. I like to think and ask my questions somewhere in between."
  - "I started my research journey in <a href=\"https://sabatini.hms.harvard.edu/\">Bernardo Sabatini</a>'s lab, curious about how and why we interact differently with the world as we grow up and grow old. Under the mentorship of <a href=\"https://mastrok.github.io/\">Kevin Mastro</a>, I investigated the impact of aging on (1) interneuron microcircuits in mouse PFC and (2) dopamine in mouse ventral striatum. Our full research program bridged an extensive behavioral assay (2-arm bandit) with these neural recordings."
  - "This work led me to appreciate that (1) the brain must be understood as a spatially distributed, but highly functionally coordinated system, and (2) the tools available to the scientific community are not designed to probe more than one part of it at a time. I spent a year in <a href=\"https://churchlab.hms.harvard.edu/\">George Church</a>'s lab, working with Dr. <a href=\"https://churchlab.hms.harvard.edu/church-lab-member/juseong-lee\">Juseong Lee</a> on viral genome engineering strategies for multiplexed control across cell types."
  - "Now rotating at Caltech to find a new home for my research interests!"

