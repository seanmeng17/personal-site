<footer class="site-footer">
  <div class="wrap site-footer-inner">
    <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}</p>
    <p class="footer-links">
      {% if site.email %}<a href="mailto:{{ site.email }}">Email</a>{% endif %}
      {% if site.social.twitter %} · <a href="https://x.com/{{ site.social.twitter }}" target="_blank" rel="noopener">Twitter</a>{% endif %}
      {% if site.social.github %} · <a href="https://github.com/{{ site.social.github }}" target="_blank" rel="noopener">GitHub</a>{% endif %}
      {% if site.social.linkedin %} · <a href="https://www.linkedin.com/in/{{ site.social.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>{% endif %}
      {% if site.social.scholar %} · <a href="{{ site.social.scholar }}" target="_blank" rel="noopener">Scholar</a>{% endif %}
      · <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </p>
  </div>
</footer>
