---
layout: default
---
<article class="page project-item">
  <p class="writing-item-back"><a href="{{ '/projects/' | relative_url }}">&larr; All projects</a></p>
  <h1 class="page-title">{{ page.title }}</h1>
  {% if page.tagline %}<p class="page-subtitle">{{ page.tagline }}</p>{% endif %}
  {% if page.year %}<p class="entry-meta">{{ page.year }}</p>{% endif %}
  {% if page.link %}<p><a href="{{ page.link }}" target="_blank" rel="noopener">View project ↗</a></p>{% endif %}
  <div class="page-content">
    {{ content }}
  </div>
</article>
