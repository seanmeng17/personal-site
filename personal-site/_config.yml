title: "Your Name"
tagline: "One-line description of what you do"
email: you@example.com
description: >-
  Personal website of Your Name — about, writing, research, projects, awards, and community.
baseurl: ""
url: "https://example.com"

# Social links shown in the footer / about page. Delete any you don't use.
social:
  twitter: ""      # e.g. yourhandle (no @)
  github: ""       # e.g. yourusername
  linkedin: ""     # e.g. yourusername
  scholar: ""      # full Google Scholar URL
  substack: ""     # full Substack URL

cv_url: "/assets/cv.pdf"

markdown: kramdown
kramdown:
  input: GFM
permalink: /:title/

collections:
  writing:
    output: true
    permalink: /writing/:path/
  projects:
    output: true
    permalink: /projects/:path/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "writing"
    values:
      layout: "writing-item"
      extra_js:
        - /assets/js/reveal.js
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project-item"
      extra_js:
        - /assets/js/reveal.js

plugins:
  - jekyll-feed
  - jekyll-sitemap

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
